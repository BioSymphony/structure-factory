<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="300" viewBox="0 0 1180 300" role="img" aria-labelledby="title desc">
  <title id="title">Structure Factory public workflow ladder</title>
  <desc id="desc">A five step ladder: local scaffold, issue pack, cloud contract, operator-gated run, verified closeout.</desc>
  <rect width="1180" height="300" fill="#f8fafc"/>
  <style>
    .step { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .title { font: 700 18px Arial, sans-serif; fill: #0f172a; }
    .body { font: 14px Arial, sans-serif; fill: #334155; }
    .gate { font: 700 13px Arial, sans-serif; fill: #be123c; }
    .arrow { stroke: #475569; stroke-width: 3; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="step" x="30" y="70" width="190" height="150" rx="8"/>
  <text class="title" x="55" y="105">1. Local Scaffold</text>
  <text class="body" x="55" y="135">manifest</text>
  <text class="body" x="55" y="158">target window</text>
  <text class="body" x="55" y="181">stage contract</text>
  <text class="gate" x="55" y="206">public or synthetic</text>

  <line class="arrow" x1="225" y1="145" x2="275" y2="145"/>

  <rect class="step" x="280" y="70" width="190" height="150" rx="8"/>
  <text class="title" x="305" y="105">2. Issue Pack</text>
  <text class="body" x="305" y="135">Linear / GitHub</text>
  <text class="body" x="305" y="158">owned paths</text>
  <text class="body" x="305" y="181">validation commands</text>
  <text class="gate" x="305" y="206">claim ceiling</text>

  <line class="arrow" x1="475" y1="145" x2="525" y2="145"/>

  <rect class="step" x="530" y="70" width="190" height="150" rx="8"/>
  <text class="title" x="555" y="105">3. Cloud Contract</text>
  <text class="body" x="555" y="135">RunPod / AWS / HPC</text>
  <text class="body" x="555" y="158">budget + cleanup</text>
  <text class="body" x="555" y="181">expected artifacts</text>
  <text class="gate" x="555" y="206">non-launching public</text>

  <line class="arrow" x1="725" y1="145" x2="775" y2="145"/>

  <rect class="step" x="780" y="70" width="190" height="150" rx="8"/>
  <text class="title" x="805" y="105">4. Operator Run</text>
  <text class="body" x="805" y="135">private packet</text>
  <text class="body" x="805" y="158">runtime secrets</text>
  <text class="body" x="805" y="181">provider logs</text>
  <text class="gate" x="805" y="206">outside public git</text>

  <line class="arrow" x1="975" y1="145" x2="1025" y2="145"/>

  <rect class="step" x="1030" y="70" width="120" height="150" rx="8"/>
  <text class="title" x="1050" y="105">5. Closeout</text>
  <text class="body" x="1050" y="135">hashes</text>
  <text class="body" x="1050" y="158">cleanup proof</text>
  <text class="body" x="1050" y="181">non-claims</text>
  <text class="gate" x="1050" y="206">verified</text>

  <text class="body" x="30" y="260">Public repo value: plan, split, validate, and prepare. Real provider mutation starts only after explicit operator authorization.</text>
</svg>
