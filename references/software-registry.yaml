    status: planned
    notes: |
      Design lane for sequence assignment after backbone generation. Pin the
      repo commit SHA in this registry before paid execution; weights or model
      caches belong in the runtime cache, for example
      /workspace/structure-factory/weights/proteinmpnn on an operator-managed
      volume. Status remains planned until the ai-design image vendor pins the
      repo commit. Designed sequences are computational candidates only;
      wet-lab use is out of campaign scope.
