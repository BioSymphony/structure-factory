    upstream_commit_sha: "5214459c42e69b01fadfc7d7ebda09d8e5082115"
    upstream_model_repo: "https://huggingface.co/yeqinglin/genie3"
    upstream_model_sha: "9ae31ebb8c56eebdc05ab282a8fd3f6a6d2a03a2"
    license_class: apache_2_reported_by_repo_and_hf
    license_gate: dependency_and_weight_terms_review
