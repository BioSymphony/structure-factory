  chimerax:
    role: visualization_figures_model_review
    image_family: model-build
    install_method: runtime_installer_or_local_review
    license_class: no_cost_noncommercial
    license_gate: noncommercial_terms
    runpod_fit: gui_or_scripted
    gpu_class: "GPU helpful for rendering; CPU possible"
    smoke_command: "ChimeraX --version || chimerax --version"
    runtime_artifacts: "chimerax_sessions/, figure_panels/"
    citation_notes: "Record ChimeraX version, commands, contour levels, camera state."
    status: gated
    notes: |
      Use for figures, sessions, model/map inspection. Multi-panel atlas
      render lanes use ChimeraX 1.x noncommercial; operator must confirm
      noncommercial use (or record a commercial license override) per
      docs/tooling-and-licensing.md before render promotion. ChimeraX is
      not redistributed in the public model-build image; runtime install
      is operator-driven.
  pymol:
