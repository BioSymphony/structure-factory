# Structure Factory software registry.
# Each entry must be verified from primary sources before status moves to ready.
# Human-readable public posture: docs/tooling-and-licensing.md
# Redistribution/image policy: docs/public-repo-and-private-image-policy.md
#
# Cloud backends: RunPod, AWS Batch, Lambda Cloud, and Modal are reviewed
# execution paths; see docs/compute-backends.md and modules/provider-profiles/.
# The runpod_fit field scores per-tool suitability for the RunPod pod path;
# Lambda and Modal fit are covered narratively in docs/compute-backends.md.

software:
  relion:
    role: cryoem_reconstruction
    image_family: cryo-core
    install_method: source_or_package_build
    license_class: open_source_gplv2
    license_gate: none
    runpod_fit: strong
    gpu_class: "RTX 4090/L40S smoke; A100/H100 production"
    smoke_command: "relion_refine --version || relion --version"
    runtime_artifacts: "versions.json, relion_toolcheck.json"
    citation_notes: "Record RELION version and cite RELION methods papers appropriate to version."
    status: planned
    notes: "Primary open-source SPA processing lane."
  cryosparc:
    role: cryoem_reconstruction_gui
    image_family: cryosparc
    install_method: runtime_license_install_or_prebuilt_private_image
    license_class: free_nonprofit_academic_proprietary
    license_gate: required_runtime_secret
    runpod_fit: strong_with_license
    gpu_class: "L40S/A100/H100"
    smoke_command: "cryosparcm status"
    runtime_artifacts: "cryosparc_project_manifest.json, job_exports/"
    citation_notes: "Record CryoSPARC version and job metadata."
    status: gated
    notes: "Use license injected at runtime; do not commit license IDs."
  warp_m:
    role: cryoem_cryoet_processing
    image_family: cryo-core
    install_method: source_or_release_build
    license_class: open_source_gplv3
    license_gate: none
    runpod_fit: strong
    gpu_class: "RTX 4090/L40S smoke; A100/H100 production"
    smoke_command: "WarpTools --help || warp --help"
    runtime_artifacts: "warp_toolcheck.json, preprocessing_manifests/"
    citation_notes: "Record Warp/M/WarpTools versions and cite corresponding methods."
    status: planned
    notes: "Linux/CUDA lane for Warp, M, WarpTools, Noise2Map."
  motioncor:
