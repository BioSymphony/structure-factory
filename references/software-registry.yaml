    runpod_fit: gui_or_vnc
    gpu_class: "GPU helpful"
    smoke_command: "ChimeraX --nogui --cmd 'exit'"
    runtime_artifacts: "isolde_session_notes.md"
    citation_notes: "Record ChimeraX/ISOLDE versions and manual interventions."
    status: gated
