repo:
  id: structure_factory
  name: BioSymphony Structure Factory
  path: <repo-root>
  hq_repo: <biosymphony-hq-repo>
  subgroup: structure-factory
  owns:
    - CryoCore handoff contracts for raw cryo-EM requests
    - deposited PDB/EMDB evidence validation
    - multimer and conformational-state atlases
    - RunPod structural-biology execution stack
    - publication-grade structural figure dossiers
  does_not_own:
    - raw cryo-EM movie intake, EMPIAR subset execution, reconstruction, or map-to-model build lanes
    - BioSymphony-wide contracts
    - GeneCluster workflows
    - Mechanistic Variant Atlas workflows outside Structure Factory model-jury integration
    - global Symphony/Linear operations
  core_change_policy: "Open a separate biosymphony-core issue before editing the HQ repo."
